spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

aladin:
  ttb-key: test-key
  base-url: https://www.aladin.co.kr/ttb/api
  identification-timeout: 500
  timeout: 2000

naver:
  client-id: test-id
  client-secret: test-secret
  base-url: https://openapi.naver.com/v1/search/shop.json
  timeout: 2000

datanaru:
  auth-key: test-key
  base-url: https://data4library.kr/api
  timeout: 2000

search:
  total-deadline: 2800
  public-library-top-n: 20
  public-library-fanout-timeout: 2200
  executor-pool-size: 3

public-library:
  bootstrap-enabled: false
  executor-pool-size: 20

elibrary:
  thread-pool-size: 5
  per-library-timeout: 15000
  total-timeout: 20000

cors:
  allowed-origins: http://localhost:3000
