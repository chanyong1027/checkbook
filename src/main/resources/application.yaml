spring:
  application:
    name: checkbook
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/checkbook}
    username: ${DB_USERNAME:checkbook}
    password: ${DB_PASSWORD:checkbook}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false

server:
  port: 8080

aladin:
  ttb-key: ${ALADIN_TTB_KEY:}
  base-url: https://www.aladin.co.kr/ttb/api
  identification-timeout: 500
  timeout: 2000

naver:
  client-id: ${NAVER_CLIENT_ID:}
  client-secret: ${NAVER_CLIENT_SECRET:}
  base-url: https://openapi.naver.com/v1/search/shop.json
  timeout: 2000

datanaru:
  auth-key: ${DATANARU_AUTH_KEY:}
  base-url: https://data4library.kr/api
  timeout: 2000

search:
  total-deadline: 2800
  public-library-top-n: 20
  public-library-fanout-timeout: 2200
  executor-pool-size: 3

public-library:
  bootstrap-enabled: false
  executor-pool-size: 20

elibrary:
  thread-pool-size: 5
  per-library-timeout: 15000
  total-timeout: 20000

rate-limit:
  requests-per-minute: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.checkbook: INFO
    com.checkbook.client: DEBUG
